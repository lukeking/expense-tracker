name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (typecheck · lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # The real legacy-csv-config.ts is gitignored (personal data); the committed
      # example has the same shape, so it satisfies typecheck/lint/tests in CI.
      - run: cp src/services/legacy-csv-config.example.ts src/services/legacy-csv-config.ts
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test

  pwa:
    name: pwa (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pwa/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  deploy-backend:
    name: deploy backend (Cloudflare Worker)
    needs: backend # only deploy once typecheck · lint · test pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID live as this environment's secrets
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: backend
      # Runs `wrangler deploy`; runtime secrets already live on the Worker
      # (set via `wrangler secret put`) and are untouched by deploys.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
