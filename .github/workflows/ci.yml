name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (typecheck · lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # The real legacy-csv-config.ts is gitignored (personal data); the committed
      # example has the same shape, so it satisfies typecheck/lint/tests in CI.
      - run: cp src/services/legacy-csv-config.example.ts src/services/legacy-csv-config.ts
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test

  pwa:
    name: pwa (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pwa/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
