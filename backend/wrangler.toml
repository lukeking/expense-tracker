name = "expense-tracker"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

[vars]
PWA_ORIGIN = "https://expense-tracker-5pj.pages.dev"
# PWA_ORIGIN = "http://localhost:5173"

[triggers]
# "0 2 * * *"    — daily Supabase keep-alive (avoids the free-tier 7-day inactivity pause)
# "0 1 26 */2 *" — invoice-import reminder: 09:00 Taipei (01:00 UTC) on the 26th of odd
#                  months (Jan/Mar/May/Jul/Sep/Nov) — the day after the 25th lottery draw,
#                  once the MOF API congestion has eased. (Delivery → Web Push, deferred.)
crons = ["0 2 * * *", "0 1 26 */2 *"]

# All secrets set via `wrangler secret put`:
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# DISCORD_PUBLIC_KEY
# DISCORD_APPLICATION_ID
# DISCORD_BOT_TOKEN
# GEMINI_API_KEY
# ANDROID_API_KEY
# DISCORD_CHANNEL_ID

# ─── Local E2E environment (feature 028) ───────────────────────────────────────
# Run: wrangler dev --env e2e
# SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ANDROID_API_KEY, PWA_ORIGIN are provided by
# .dev.vars.e2e (gitignored; `cp .dev.vars.e2e.example .dev.vars.e2e`). All local, non-secret.
[env.e2e]
