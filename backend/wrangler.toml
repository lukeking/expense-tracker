name = "expense-tracker"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

[vars]
PWA_ORIGIN = "https://expense-tracker-5pj.pages.dev"
# PWA_ORIGIN = "http://localhost:5173"

[triggers]
crons = ["0 9 1 */2 *"]

# All secrets set via `wrangler secret put`:
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# DISCORD_PUBLIC_KEY
# DISCORD_APPLICATION_ID
# DISCORD_BOT_TOKEN
# GEMINI_API_KEY
# ANDROID_API_KEY
# DISCORD_CHANNEL_ID

# ─── Local E2E environment (feature 028) ───────────────────────────────────────
# Run: wrangler dev --env e2e
# SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ANDROID_API_KEY, PWA_ORIGIN are provided by
# .dev.vars.e2e (gitignored; `cp .dev.vars.e2e.example .dev.vars.e2e`). All local, non-secret.
[env.e2e]
